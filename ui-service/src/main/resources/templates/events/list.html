<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Event Registration System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">EventHub</a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/events" class="nav-link active">Events</a>
                <div class="nav-right">
                    <a href="/events/create" class="nav-link btn-primary" id="createEventLink">Create Event</a>
                    <a href="/login" class="nav-link" id="loginLink">Login</a>
                    <a href="/register" class="nav-link" id="registerLink">Register</a>
                    <a href="/profile" class="nav-link" id="profileLink" style="display:none">Profile</a>
                    <a href="#" class="nav-link" id="logoutLink" style="display:none">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="events-page">
        <div class="events-header">
            <h1>Upcoming Events</h1>
            <p>Discover and register for events that interest you</p>
        </div>
        <div id="eventsContainer" class="events-grid">
            <div class="loading">Loading events...</div>
        </div>
        <div id="eventsError" class="form-error" style="display:none"></div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h4>EventHub</h4>
                <p>Your complete event management solution.</p>
            </div>
            <div class="footer-section">
                <h4>Quick Links</h4>
                <a href="/">Home</a>
                <a href="/events">Events</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 EventHub. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/auth.js"></script>
</body>
</html>
