<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details - Event Registration System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">EventHub</a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/events" class="nav-link">Events</a>
                <div class="nav-right">
                    <a href="/events/create" class="nav-link btn-primary" id="createEventLink">Create Event</a>
                    <a href="/login" class="nav-link" id="loginLink">Login</a>
                    <a href="/register" class="nav-link" id="registerLink">Register</a>
                    <a href="/profile" class="nav-link" id="profileLink" style="display:none">Profile</a>
                    <a href="#" class="nav-link" id="logoutLink" style="display:none">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="event-detail-page">
        <div class="event-detail-container">
            <div class="event-detail-header">
                <a href="/events" class="back-link">&larr; Back to Events</a>
            </div>
            <div id="eventDetail" class="event-detail">
                <div class="loading">Loading event details...</div>
            </div>
            <div id="registerSection" class="register-section" style="display:none">
                <button class="btn btn-primary btn-lg btn-block" onclick="handleRegisterForEvent()">Register for this Event</button>
            </div>
            <div id="registrationStatus" class="registration-status" style="display:none"></div>
            <div id="eventError" class="form-error" style="display:none"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h4>EventHub</h4>
                <p>Your complete event management solution.</p>
            </div>
            <div class="footer-section">
                <h4>Quick Links</h4>
                <a href="/">Home</a>
                <a href="/events">Events</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 EventHub. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/auth.js"></script>
</body>
</html>
