<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Event Registration System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">EventHub</a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/events" class="nav-link">Events</a>
                <div class="nav-right">
                    <a href="/login" class="nav-link active">Login</a>
                    <a href="/register" class="nav-link btn-primary">Register</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="form-page">
        <div class="form-container">
            <div class="form-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your account</p>
            </div>
            <form id="loginForm" class="form" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <div id="loginError" class="form-error" style="display:none"></div>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>
            <div class="form-footer">
                <p>Don't have an account? <a href="/register">Register here</a></p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h4>EventHub</h4>
                <p>Your complete event management solution.</p>
            </div>
            <div class="footer-section">
                <h4>Quick Links</h4>
                <a href="/">Home</a>
                <a href="/events">Events</a>
                <a href="/register">Register</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 EventHub. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/auth.js"></script>
</body>
</html>
